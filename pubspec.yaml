name: musbx
description: Musician's Toolbox

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 1.14.2+62

environment:
  sdk: ^3.9.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  app_links: ^6.4.1
  audio_service: ^0.18.18
  audio_session: ^0.2.3
  awesome_notifications: ^0.10.1
  awesome_notifications_core: ^0.10.1
  connectivity_plus: ^7.1.1
  crypto: ^3.0.7
  device_info_plus: ^12.4.0
  dio: ^5.9.2
  dynamic_color:
    git: # A specific fork is required for tone-based colors. TODO: Use the official version once updated
      url: https://github.com/hasali19/material-foundation-flutter-packages.git
      ref: main
      path: packages/dynamic_color/
  file_picker: ^10.3.10
  firebase_analytics: ^12.3.0
  firebase_core: ^4.7.0
  flutter:
    sdk: flutter
  flutter_m3shapes: ^1.0.0+2
  flutter_markdown_plus: ^1.0.7
  flutter_recorder: ^1.1.4
  flutter_soloud: ^4.0.3
  gauges: ^1.0.0 # TODO: Migrate away from this package
  go_router: ^17.2.2
  google_fonts: ^8.0.2
  google_mobile_ads: ^7.0.0
  html_unescape: ^2.0.0
  http: ^1.6.0
  http_parser: ^4.1.2
  in_app_purchase: ^3.2.3
  json_annotation: ^4.11.0
  just_waveform: ^0.0.7
  material_plus:
    path: ../material_plus
  material_symbols_icons: ^4.2928.1
  package_info_plus: ^9.0.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  pub_semver: ^2.2.0
  shared_preferences: ^2.5.5
  simple_icons: ^14.6.1
  supabase_flutter: ^2.12.4
  uri_to_file: # The version on pub.dev is terribly outdated
    git:
      url: https://github.com/sumitsharansatsangi/uri-to-file
      ref: main
  url_launcher: ^6.3.2
  uuid: ^4.5.3
  volume_controller: ^3.4.4



dev_dependencies:
  build_runner: ^2.14.1
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  flutter_test:
    sdk: flutter
  json_serializable: ^6.13.1

# To apply changes to the icon configuration, run:
# `dart run flutter_launcher_icons`
flutter_launcher_icons:
  android: true
  min_sdk_android: 24
  ios: true
  image_path_ios: "assets/logo/ios.png"
  remove_alpha_ios: true
  image_path: "assets/logo/logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo/adaptive_foreground.png"
  adaptive_icon_foreground_inset: 0 # We could probably use this, but currently the image contains padding in itself.
  adaptive_icon_monochrome: "assets/logo/adaptive_monochrome.png"

  windows:
    generate: true
    icon_size: 256 # min:48, max:256, default: 48

# To apply changes to the splash screen configuration, run:
# `dart run flutter_native_splash:create`
flutter_native_splash:
  color: "#ffffff"
  color_dark: "#1a1a1a"
  image: assets/splash/splash.png
  android_12:
    image: assets/splash/splash_android12.png

  ios: true
  web: false

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/splash/splash.png
    # Metronome
    - assets/sounds/metronome/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  fonts:
    - family:  CustomIcons
      fonts:
       - asset: assets/fonts/CustomIcons.ttf

  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
